spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:migestion_local}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    # Removed explicit dialect — Hibernate auto-detects PostgreSQLDialect
  flyway:
    enabled: false
    # Disabled: no migration files exist. Schema managed by ddl-auto=update.
    # Re-enable when you create src/main/resources/db/migration/V1__init.sql
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

stripe:
  api-key: ${STRIPE_API_KEY:sk_test_mock}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_mock}

jwt:
  secret: ${JWT_SECRET:4z6B6Q8A5S2D3F4G5H6J7K8L9M0N1B2V3C4X5Z6M7N8B9V0C1X2Z3A4S5D6F7G8H}

logging:
  level:
    com.migestion: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
